<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>JS Chat UI</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; flex-direction: column; }
        #chat-container { flex-grow: 1; }
        #user-list-container { width: 200px; }
        #chat-window { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .message { margin-bottom: 8px; padding: 5px; border-radius: 5px; }
        .message .sender { font-weight: bold; }
        .my-message { background-color: #dcf8c6; margin-left: auto; width: fit-content; }
        .other-message { background-color: #fff; width: fit-content; }
        h1, h2 { margin-top: 0; }
        #chat {display: none;  flex-grow: 1; }
        #login-register-panel {
            display: block;  /* Явно указываем, что он видим по умолчанию */
        }
    </style>
</head>
<body>
    <div id = "chat">
                        <div id="chat-container">
                            <h1>Мой Чат</h1>
                            <div id="rooms-container">
                                <h3>Комнаты:</h3>
                                <div id="current-room">Вы в комнате: <span id="room-name">general</span></div>
                                <div id="room-buttons">
                                    <button class="room-btn active" data-room="general">general</button>
                                    <button class="room-btn" data-room="work">work</button>
                                </div>
                            </div>
                            
                            <div id="chat-window">
                                <!-- Сообщения будут появляться здесь -->
                            </div>
                            <form id="message-form">
                                <input type="text" id="message-input" placeholder="Введите сообщение..." size="60" required>
                                <button type="submit">Отправить</button>
                            </form>
                        </div>

                        <div id="logout-block">
                                <button id = "logout">Выход</button>
                        </div>

                        <div id="user-list-container">
                            <h2>Активные пользователи</h2>
                            <ul id="user-list">
                                <!-- Список пользователей будет здесь -->
                            </ul>
                        </div>

    </div>


    <div id="login-register-panel"> 
        <div id="login-block">
            <h2>Вход в чат</h2>
            <input type="text" id="username"  placeholder="Твой ник">
            <!-- <input type="password" id="password" placeholder="Секретный код"> -->
            <button id="login-btn">Войти в чат</button>
            <p id="login-error"></p>
        </div>


        <div id="register-block"> 
            <h2>Регистрация</h2>
            <p> Если ты новый пользователь, пожалуйста, зарегистрируйся </p>
            <input type="text" id="username"  placeholder="Твой ник">
            <button id="register-btn">Зарегистрироваться</button>
            <p id="register-error"></p>
        </div>
</div>

    <script src = "scripts.js">
     
    </script>
</body>
</html>
